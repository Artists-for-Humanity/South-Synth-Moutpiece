<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>South Synth Mouthpiece</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@700&family=IBM+Plex+Sans+Condensed:wght@600&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toolbar hidden">
    <input id="audioFile" type="file" accept="audio/*">
    <button id="playButton" disabled>Play</button>

    <label>
      Shape
      <select id="shapeMode">
        <option value="circle">Circle</option>
        <option value="line" selected>Line</option>
      </select>
    </label>

    <label>
      Width
      <input id="mouthWidth" type="range" min="320" max="2400" value="1200">
      <span id="widthValue" class="value">1200</span>
    </label>

    <label>
      Height
      <input id="mouthHeight" type="range" min="40" max="420" value="155">
      <span id="heightValue" class="value">430</span>
    </label>

    <label>
      React
      <input id="sensitivity" type="range" min="40" max="220" value="125">
      <span id="sensitivityValue" class="value">1.43</span>
    </label>

    <label>
      <input id="loopSound" type="checkbox" checked>
      Loop
    </label>

    <span id="status" class="status">Loading scenario...</span>
  </div>

  <main class="scenario-copy" aria-label="Scenario internal log">
    <section id="scenarioLog" class="scenario-log" aria-live="polite" aria-label="Internal system log"></section>
  </main>

  <nav id="scenarioTopicNav" class="scenario-topic-nav" aria-label="Scenario topics"></nav>

  <section class="scenario-prompt-layer" aria-label="User prompt">
    <div class="scenario-prompt-line">
      <span id="scenarioPromptText"></span><span class="typing-caret" aria-hidden="true"></span>
    </div>
  </section>

  <section id="scenarioTitleCard" class="scenario-title-card is-hidden" aria-live="polite"></section>

  <!-- Home / attract screen -->
  <div id="homeScreen" class="home-screen">
    <div class="home-text">
      <p class="home-quote">&ldquo;A computer can never be held accountable, therefore a computer must never make a management decision.&rdquo;</p>
      <p class="home-attribution">IBM Training Manual, 1979</p>
    </div>
    <button id="startButton" class="home-start-btn" type="button">START</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
